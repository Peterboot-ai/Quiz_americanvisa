    <!-- Quiz Tracking Helper Functions -->
    <script>
      window.unlockedTracking = {
        trackEvent: function(eventName, eventData) {
          if (window.dataLayer) {
            window.dataLayer.push(Object.assign({event: eventName}, eventData || {}));
          }
        },
        getCurrentStep: function() {
          var urlParams = new URLSearchParams(window.location.search);
          return urlParams.get('step') || 'inicio';
        },
        trackConversion: function(conversionName, conversionValue) {
          this.trackEvent('conversion', {
            conversion_name: conversionName,
            conversion_value: conversionValue || 0,
            conversion_timestamp: new Date().toISOString()
          });
        }
      };
      // dataLayer will be initialized by tenant-injected GTM
      window.dataLayer = window.dataLayer || [];
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/react-app/main.tsx"></script>
  </body>
